kind = "web"
previewPath = "/"
title = "批量地理编码转换器"
version = "1.0.0"
id = "artifacts/geocoding-saas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21507

[services.development]
run = "pnpm --filter @workspace/geocoding-saas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/geocoding-saas", "run", "build" ]
publicDir = "artifacts/geocoding-saas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21507"
BASE_PATH = "/"
